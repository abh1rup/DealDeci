##############################################
# DealDeci Pitch Decimator AI
# 3-tier Docker deployment: Frontend + Backend + Data
#
# Usage:
#   1. Copy .env.example to .env and fill in your API key
#   2. docker compose up --build -d
#   3. Open http://localhost in your browser
#
# To stop:  docker compose down
# To reset: docker compose down -v  (deletes all data)
##############################################

services:

  # ── FRONTEND (nginx) ──
  # Serves static HTML/CSS/JS, proxies /api to backend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: dealdeci-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dealdeci-net

  # ── BACKEND (Node.js/Express) ──
  # API server, Anthropic AI calls, file generation
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: dealdeci-backend
    env_file:
      - .env
    environment:
      - OUTPUT_DIR=/data/output
      - RUNS_FILE=/data/runs.json
      - USERS_FILE=/data/users.json
      - PORT=3000
    volumes:
      - dealdeci-data:/data
    restart: unless-stopped
    networks:
      - dealdeci-net
    # No ports exposed to host — only accessible via nginx proxy

  # ── DATA (named volume) ──
  # Persists: output files, run history, user profiles

volumes:
  dealdeci-data:
    driver: local

networks:
  dealdeci-net:
    driver: bridge
